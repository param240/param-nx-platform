name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Version is read from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Sets NX_BASE / NX_HEAD so `nx affected` only checks changed projects
      - uses: nrwl/nx-set-shas@v4

      - run: pnpm nx affected -t lint typecheck --parallel=3
