format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
    - NODE_VERSION: "20"

trigger_map:
  - push_branch: main
    workflow: build-ios
  - push_branch: main
    workflow: build-android
  - pull_request_source_branch: "*"
    workflow: pr-check

workflows:

  # ── Shared anchor ──────────────────────────────────────────────────────────
  _setup: &setup
    - activate-ssh-key@4: {}
    - git-clone@8: {}
    - script@1:
        title: Install pnpm and dependencies
        inputs:
          - content: |
              npm install -g pnpm
              pnpm install --frozen-lockfile

  # ── PR quality gate ────────────────────────────────────────────────────────
  pr-check:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}
      - script@1:
          title: Install pnpm and dependencies
          inputs:
            - content: |
                npm install -g pnpm
                pnpm install --frozen-lockfile
      - script@1:
          title: Lint and typecheck
          inputs:
            - content: pnpm nx run-many -t lint typecheck --parallel=3

  # ── iOS build → TestFlight (internal) ─────────────────────────────────────
  build-ios:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}
      - script@1:
          title: Install pnpm and dependencies
          inputs:
            - content: |
                npm install -g pnpm
                pnpm install --frozen-lockfile
      - script@1:
          title: EAS Build — iOS preview
          inputs:
            - content: |
                cd apps/my-well-journey
                pnpm dlx eas-cli build \
                  --platform ios \
                  --profile preview \
                  --non-interactive \
                  --wait
      - script@1:
          title: EAS Submit — TestFlight internal
          inputs:
            - content: |
                cd apps/my-well-journey
                pnpm dlx eas-cli submit \
                  --platform ios \
                  --profile preview \
                  --non-interactive \
                  --latest

  # ── Android build → Firebase App Distribution (internal) ──────────────────
  build-android:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}
      - script@1:
          title: Install pnpm and dependencies
          inputs:
            - content: |
                npm install -g pnpm
                pnpm install --frozen-lockfile
      - script@1:
          title: EAS Build — Android preview
          inputs:
            - content: |
                cd apps/my-well-journey
                pnpm dlx eas-cli build \
                  --platform android \
                  --profile preview \
                  --non-interactive \
                  --wait \
                  --output /tmp/app-preview.apk
      - firebase-app-distribution@0:
          title: Distribute to Firebase App Distribution
          inputs:
            - app: $FIREBASE_APP_ID
            - firebase_token: $FIREBASE_TOKEN
            - apk_path: /tmp/app-preview.apk
            - groups: internal-testers
